        function  displaydataInTable(data){
            data.forEach(patient => {
                let tbody=document.getElementById("tablebody");
                let row = tbody.insertRow();
                row.insertCell(0).textContent=patient.id;
                row.insertCell(1).textContent=patient.name;
                row.insertCell(2).textContent=patient.weight;
                row.insertCell(3).textContent=patient.age;
                row.insertCell(4).textContent=patient.disease;
                row.insertCell(5).textContent=patient.gender;
                row.insertCell(6).textContent=patient.doctor;
                row.insertCell(7).innerHTML=` <button onclick=" edit()">Edit</button>`
