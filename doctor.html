<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <a class="navbar-brand" href="#">Hospital</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarTogglerDemo02" aria-controls="navbarTogglerDemo02" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
      
        <div class="collapse navbar-collapse" id="navbarTogglerDemo02">
          <ul class="navbar-nav mr-auto mt-2 mt-lg-0">
            <li class="nav-item active">
              <a class="nav-link" href="index.html">Home </a>

            <li class="nav-item">

            <li class="nav-item">

            </li>
          </ul>
        </div>
      </nav>
    <h1>Doctors info</h1>
    <table>
        <thead>
            <th>Id</th>
            <th>Name</th>
            <th>Salary</th>
            <th>Age</th>
            <th>Specification</th>
            <th>Gender</th>
        </thead>
       <tbody id="tablebody"></tbody>
    </table>
    <script>
        
        fetch('https://doc-back.onrender.com/doctors')
        .then(response => response.json())
        .then(data=>{
            displaydataInTable(data)
        });
        function  displaydataInTable(data){


            data.forEach(doctor => {
                let tbody=document.getElementById("tablebody");
                let row = tbody.insertRow();
                row.insertCell(0).textContent=doctor.id;
                row.insertCell(1).textContent=doctor.name;
                row.insertCell(2).textContent=doctor.salary;
                row.insertCell(3).textContent=doctor.age;
                row.insertCell(4).textContent=doctor.specialization;
                row.insertCell(5).textContent=doctor.gender;


            
            });
        }
    </script>
</body>
</html>
